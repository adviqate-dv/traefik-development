# Global logging settings
log:
  level: "INFO"
accessLog: {}

# API & Dashboard
api:
  dashboard: true
  insecure: false

# Entrypoints configuration
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls: true

# Infrastructure Providers
providers:
  docker:
    exposedByDefault: false
    network: "traefik_proxy"
  file:
    filename: "/dynamic/tls.yaml"

