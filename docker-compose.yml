services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      - traefik_proxy

    ports:
      - "80:80"
      - "443:443"

    environment:
      # Lego still needs this environment variable to validate the TLS handshake!
      - LEGO_CA_CERTIFICATES=/step-ca/root_ca.crt

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/certs:ro
      
      # 1. MOUNT THE TRAEFIK.YAML CONFIGURATION FILE
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro

      # ---------
      # EXTERNAL CA VOLUME MAPPINGS
      # ---------
      - ./traefikfiles/acme.json:/smallstepCA/acme.json
      - ./root-ca-data/certs/root_ca.crt:/step-ca/root_ca.crt:ro

    # The entire "command:" block is removed because traefik.yaml covers it now

    labels:
      - "traefik.enable=true"
      # Dashboard routing remains identical via labels
      - "traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=smallstepCA"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:${DASHBOARD_BASIC_AUTH_HASH}"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"

  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.traefik.traefik-development.orb.local`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.tls.certresolver=smallstepCA"

networks:
  traefik_proxy:
    name: traefik_proxy
